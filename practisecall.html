<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Document</title>
</head>

<body>
  <div class="h-[500px]">
    <div class="flex bg-green-200 rounded-3xl gap-9 ">
      <h1 class="font-bold text-[70px]"><span id="coinClick">100</span></h1>
      <img src="assets/coin.png" alt="">
    </div>
    <button id="b1" class="text-[50px] border-2 mt-8">click</button>
  </div>
  <div class="border-2 h-[380px] w-[500px]">
    <h1 class="font-bold text-[40px]">Call history</h1>
  </div>


  <script>
    const historyData = []
    document.getElementById('b1').addEventListener('click', function () {
      
      alert('Calling National Emergency Number 999');
      const value = 20;
      const coin = parseInt(document.getElementById('coinClick').innerText);
      const Updatecoin = coin - value;
      document.getElementById('coinClick').innerText = Updatecoin;
      const data = {
        name: 'National Emergency Number',
        value1: 999,
        date: new Date().toLocaleTimeString()

      }
      historyData.push[data];
      console.log(historyData);
      if (Updatecoin < 20) {
        alert('Less than 20 coins');
      }
      else {
        return;
      }

    })



  </script>
</body>

</html>
